# Notify Bing / Yandex / Seznam / Naver (the IndexNow consortium) every
# time a fresh build is deployed to GitHub Pages, so they recrawl the
# new URLs without waiting for their scheduled crawl. Google does not
# participate in IndexNow; Googlebot picks the same updates up via the
# sitemap lastmod field (regenerated on every build).
#
# Key handling: the key 69949e2f0e0b1ce00f0db6a49959f7d3 lives at
# web/static/69949e2f0e0b1ce00f0db6a49959f7d3.txt and is served at
# https://mrpeppersdev.github.io/agent-infrastructure-landscape/<key>.txt
# — IndexNow fetches this file to confirm we own the host.
#
# Trigger: after Deploy to GitHub Pages finishes successfully. We pull
# the sitemap from the live site (rather than from the artifact) so we
# only submit URLs that are actually reachable.

name: Notify IndexNow

on:
  workflow_run:
    workflows: ['Deploy to GitHub Pages']
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Submit sitemap URLs to IndexNow
        env:
          INDEXNOW_KEY: 69949e2f0e0b1ce00f0db6a49959f7d3
          SITE_HOST: mrpeppersdev.github.io
          SITEMAP_URL: https://mrpeppersdev.github.io/agent-infrastructure-landscape/sitemap.xml
        run: |
          set -euo pipefail

          KEY_LOCATION="https://${SITE_HOST}/agent-infrastructure-landscape/${INDEXNOW_KEY}.txt"

          # Pull the live sitemap and extract <loc> values. The sitemap
          # already only contains canonical URLs (no .html sidecars), so
          # no further cleanup is needed.
          curl -fsSL "$SITEMAP_URL" -o sitemap.xml
          grep -oE '<loc>[^<]+</loc>' sitemap.xml \
            | sed -E 's|<loc>(.*)</loc>|\1|' \
            > urls.txt

          TOTAL=$(wc -l < urls.txt | tr -d ' ')
          echo "Sitemap contains $TOTAL URLs"

          # IndexNow accepts up to 10,000 URLs per request. The catalog
          # currently sits well under that, but split into 1000-line
          # batches so we don't have to revisit this when it grows.
          split -l 1000 urls.txt batch_

          for batch in batch_*; do
            URLS_JSON=$(jq -R -s -c 'split("\n") | map(select(length > 0))' "$batch")
            PAYLOAD=$(jq -n \
              --arg host "$SITE_HOST" \
              --arg key "$INDEXNOW_KEY" \
              --arg keyLocation "$KEY_LOCATION" \
              --argjson urlList "$URLS_JSON" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

            echo "Submitting $(echo "$URLS_JSON" | jq 'length') URLs (batch: $batch)…"

            HTTP_STATUS=$(curl -sS -o response.txt -w '%{http_code}' \
              -X POST 'https://api.indexnow.org/IndexNow' \
              -H 'Content-Type: application/json; charset=utf-8' \
              -d "$PAYLOAD")

            echo "  → HTTP $HTTP_STATUS"
            # IndexNow returns 200 (accepted) or 202 (accepted, processing);
            # both are success. 422 means at least one URL was malformed.
            case "$HTTP_STATUS" in
              200|202) ;;
              *)
                echo "::warning::IndexNow returned $HTTP_STATUS for $batch"
                head -c 2000 response.txt || true
                echo
                ;;
            esac
          done

          echo "Done."
