# Weekly catalog-staleness check (issue #38 / T0-4).
#
# Once a week, walk every catalog row with a GitHub repo URL and ask the
# GitHub API for the latest commit date. Rows whose last commit is older
# than the freshness SLA defined in MAINTAINER.md §2 (active <12mo,
# stale 12-24mo, abandoned >24mo) get a GitHub Issue opened automatically,
# labelled `stale-row`, so catalog decay is visible rather than silent.
#
# This is the post-mortem-driven mitigation for "awesome-list decay":
# the difference between catalogs that survive (DB-Engines, State of JS)
# and catalogs that quietly rot (most awesome-* repos) is whether
# staleness is broadcast or hidden. Broadcast it.
#
# Operational properties:
#   - Schedule: every Monday at 12:00 UTC.
#   - Manual trigger: workflow_dispatch is enabled for ad-hoc reruns.
#   - Sanity cap: the script's --max-emit ceiling stops us from opening
#     hundreds of issues on the first run; we also de-duplicate against
#     any existing open `stale-row` issue with the same row id in the
#     title.
#   - Permissions: read contents, write issues. Nothing else.
#   - Auth: GITHUB_TOKEN (the default actions token) has read access to
#     public repos and write access to issues on this repo, which is all
#     we need.

name: Staleness check

on:
  schedule:
    # Mondays 12:00 UTC. cron syntax: minute hour day-of-month month day-of-week
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# A single run is enough; cancel any in-flight predecessor if a new one
# starts (rare for a weekly cron, but cheap insurance for the manual
# workflow_dispatch case).
concurrency:
  group: staleness
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run staleness scan (online — uses GitHub API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Cap at 20 emitted issues per run. Full counts still land in the
        # summary report we upload as an artifact, so we don't lose
        # visibility on long-tail decay.
        run: |
          python scripts/check_staleness.py \
            --threshold-days 365 \
            --threshold-abandoned 730 \
            --max-emit 20 \
            --output extraction/staleness-report.json \
            --reports-dir extraction \
            --sleep 0.2

      - name: Upload full staleness summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staleness-summary
          path: extraction/staleness-summary.json
          retention-days: 90

      - name: Open / refresh stale-row issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: extraction/staleness-report.json
        # For each flagged row, look for an open issue with the row id in
        # the title and the `stale-row` label. If found: skip (manual
        # reopen is the supported workflow per the issue spec — auto-close
        # on resumed activity is out-of-scope). If not found: open one.
        #
        # Body markdown is rendered by scripts/_staleness_issue_bodies.py
        # (testable in isolation) — the bash loop here is just dedupe + gh
        # invocation. `gh issue create --body-file` consumes the rendered
        # body, which sidesteps YAML/heredoc indentation nonsense.
        run: |
          set -euo pipefail
          if [ ! -s "$REPORT" ]; then
            echo "No staleness report file or empty payload — nothing to do."
            exit 0
          fi

          mkdir -p /tmp/stale-bodies
          opened=0
          skipped=0

          python scripts/_staleness_issue_bodies.py "$REPORT" /tmp/stale-bodies

          count=$(ls /tmp/stale-bodies/*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "Processing $count flagged rows from $REPORT"

          for meta_file in /tmp/stale-bodies/*.json; do
            i=$(basename "$meta_file" .json)
            body_file="/tmp/stale-bodies/${i}.md"
            row_id=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["id"])' "$meta_file")
            title=$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["title"])' "$meta_file")

            # Search by row id within open issues with the stale-row label.
            existing=$(gh issue list \
              --state open \
              --label stale-row \
              --search "\"${row_id}\" in:title" \
              --json number \
              --jq 'length')

            if [ "$existing" != "0" ]; then
              echo "skip: already-open issue exists for ${row_id}"
              skipped=$((skipped + 1))
              continue
            fi

            echo "open: ${title}"
            gh issue create \
              --title "${title}" \
              --label stale-row \
              --body-file "${body_file}"
            opened=$((opened + 1))
          done

          echo "Opened ${opened} new stale-row issues; skipped ${skipped} already-open."
